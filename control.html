<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Noodmelder Control Center</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: #2c3e50; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 400px; text-align: center; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-alarm { background-color: #e74c3c; color: white; }
        .btn-ok { background-color: #27ae60; color: white; }
        #status-msg { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚨 Noodmelder</h1>
    <label>Bericht:</label>
    <select onchange="document.getElementById('custom-text').value = this.value">
        <option value="">-- Kies --</option>
        <option value="🚨 BRANDALARM! Verlaat het gebouw.">🔥 Brandalarm</option>
        <option value="🛡️ LOCKDOWN: Blijf in de lokalen.">🔒 Lockdown</option>
        <option value="📢 TESTBERICHT: Geen actie nodig.">🛠️ Testbericht</option>
    </select>
    <input type="text" id="custom-text" placeholder="Of typ hier zelf...">
    
    <button class="btn btn-alarm" onclick="updateMelding('alarm')">ACTIVEER ALARM</button>
    <button class="btn btn-ok" onclick="updateMelding('ok')">RESET (VEILIG)</button>
    <div id="status-msg"></div>
</div>

<script>
    const REPO = 'karelgonnissen/noodmelder';
    const FILE = 'melding.json';

    async function updateMelding(statusType) {
        const msg = document.getElementById('custom-text').value;
        const statusDiv = document.getElementById('status-msg');
        
        // Vraag om de token als die nog niet bekend is
        let token = sessionStorage.getItem('gh_token');
        if (!token) {
            token = prompt("Voer je GitHub Token in (ghp_...):");
            if (!token) return;
            sessionStorage.setItem('gh_token', token);
        }

        statusDiv.innerText = "Bezig...";
        
        try {
            const url = `https://api.github.com/repos/${REPO}/contents/${FILE}`;
            const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            if (res.status === 401) { sessionStorage.removeItem('gh_token'); throw new Error("Token ongeldig."); }
            const data = await res.json();

            const content = btoa(unescape(encodeURIComponent(JSON.stringify({ status: statusType, bericht: msg }))));

            const putRes = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Update", content: content, sha: data.sha })
            });

            if (putRes.ok) {
                statusDiv.innerText = "✅ Succesvol bijgewerkt!";
                statusDiv.style.color = "#27ae60";
            } else { throw new Error("Update mislukt."); }
        } catch (err) {
            statusDiv.innerText = "❌ Fout: " + err.message;
            statusDiv.style.color = "#e74c3c";
        }
    }
</script>
</body>
</html>
