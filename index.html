<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Live Noodmelder</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; transition: background 0.5s; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 80%; }
        .alarm { background-color: #e74c3c !important; color: white; }
        .alarm .card { border: 5px solid white; }
        h1 { font-size: 3rem; }
        #bericht { font-size: 1.5rem; margin: 20px 0; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="card">
    <h1 id="header">✅ Systeem OK</h1>
    <p id="bericht">Bezig met laden van status...</p>
    <p style="font-size: 0.8rem; color: #888;">Laatst gecontroleerd: <span id="last-check">--:--</span></p>
</div>

<audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/emergency_it_is_an_emergency.ogg"></audio>

<script>
    const statusUrl = 'melding.json'; // Pakt het bestand uit dezelfde map

    async function checkStatus() {
        try {
            // Voorkom dat de browser een oude versie uit het geheugen pakt (cache-busting)
            const response = await fetch(statusUrl + '?t=' + new Date().getTime());
            const data = await response.json();
            
            const body = document.body;
            const header = document.getElementById('header');
            const berichtText = document.getElementById('bericht');
            const sound = document.getElementById('alarm-sound');

            if (data.status === "alarm") {
                body.className = "alarm";
                header.innerText = "🚨 NOODSITUATIE";
                header.classList.add("blink");
                berichtText.innerText = data.bericht;
                sound.play(); // Speelt alarmgeluid af
            } else {
                body.className = "";
                header.innerText = "✅ Systeem OK";
                header.classList.remove("blink");
                berichtText.innerText = data.bericht;
                sound.pause();
                sound.currentTime = 0;
            }
            document.getElementById('last-check').innerText = new Date().toLocaleTimeString();
        } catch (error) {
            console.error("Fout bij ophalen status:", error);
        }
    }

    // Controleer elke 5 seconden
    setInterval(checkStatus, 5000);
    // Voer ook direct uit bij opstarten
    checkStatus();
</script>
</body>
</html>
