<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Live Noodmelder</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Basis instellingen */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            transition: background 0.3s; 
            background-color: #f4f4f4;
        }

        /* De witte kaart in het midden */
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            text-align: center; 
            width: 85%; 
            max-width: 700px;
            color: #333; /* FORCEER DONKERE TEKST OP WITTE KAART */
        }

        /* Alarm stand voor de achtergrond */
        .alarm-bg { 
            background-color: #e74c3c !important; 
        }

        /* Tekst stijlen */
        h1 { font-size: 3.5rem; margin: 10px 0; color: #2c3e50; }
        .alarm-bg h1 { color: #c0392b; } /* Donkerrood in de witte kaart bij alarm */
        
        #bericht { 
            font-size: 2rem; 
            margin: 25px 0; 
            line-height: 1.4;
            font-weight: bold;
            color: #000; /* ALTIJD ZWART */
        }

        .status-footer { font-size: 0.9rem; color: #7f8c8d; margin-top: 20px; }

        /* Knipperen van de kaart bij alarm */
        .blink-border { 
            border: 10px solid #e74c3c;
            animation: blinker 1s linear infinite; 
        }
        @keyframes blinker { 50% { border-color: transparent; } }
    </style>
</head>
<body id="bg">

<div class="card" id="main-card">
    <h1 id="header">✅ Systeem OK</h1>
    <div id="bericht">Bezig met laden van status...</div>
    <div class="status-footer">Laatst gecontroleerd: <span id="last-check">--:--:--</span></div>
</div>

<audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/emergency_it_is_an_emergency.ogg"></audio>

<script>
    async function checkStatus() {
        try {
            const response = await fetch('melding.json?t=' + new Date().getTime());
            const data = await response.json();
            
            const body = document.getElementById('bg');
            const card = document.getElementById('main-card');
            const header = document.getElementById('header');
            const berichtText = document.getElementById('bericht');
            const sound = document.getElementById('alarm-sound');

            if (data.status === "alarm") {
                body.classList.add("alarm-bg");
                card.classList.add("blink-border");
                header.innerText = "🚨 NOODSITUATIE";
                berichtText.innerText = data.bericht;
                sound.play();
            } else {
                body.classList.remove("alarm-bg");
                card.classList.remove("blink-border");
                header.innerText = "✅ Systeem OK";
                berichtText.innerText = data.bericht;
                sound.pause();
                sound.currentTime = 0;
            }
            document.getElementById('last-check').innerText = new Date().toLocaleTimeString();
        } catch (error) {
            console.error("Status check mislukt", error);
        }
    }

    setInterval(checkStatus, 30000);
    checkStatus();
</script>
</body>
</html>
