<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 250px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 15px;
            margin: 0;
        }
        .header {
            color: #d93025;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 2px solid #f1f3f4;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .status {
            display: flex;
            align-items: center;
            color: #1e8e3e;
        }
        .dot {
            height: 10px;
            width: 10px;
            background-color: #1e8e3e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="header">Live Noodmelder</div>
    <div class="status">
        <span class="dot"></span>
        Systeem is actief
    </div>
    <p>U ontvangt automatisch meldingen bij noodgevallen.</p>
</body>
</html>
